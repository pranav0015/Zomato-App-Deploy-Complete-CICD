alertmanager:
  alertmanagerSpec:
    secrets:
      - slack-webhook

  config:
    global:
      resolve_timeout: 5m
      slack_api_url_file: /etc/alertmanager/secrets/slack-webhook/slack_api_url

    route:
      receiver: slack-notifications

    receivers:
      - name: slack-notifications
        slack_configs:
          - channel: "all-zamoto-monitoring"
            send_resolved: true

            title: "{{ .CommonAnnotations.summary }}"

            text: |
              Alert Name: {{ .CommonLabels.alertname }}

              Severity: {{ .CommonLabels.severity }}

              Description:
              {{ .CommonAnnotations.description }}