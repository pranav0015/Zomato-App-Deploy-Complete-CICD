apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: monitoring-stack
  namespace: argocd

spec:
  project: default

  sources:

    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: 86.2.2

      helm:
        skipCrds: true
        valueFiles:
          - $values/Alert-Monitoring/monitoring-stack/values.yaml

    - repoURL: https://github.com/pranav0015/Zomato-App-Deploy-Complete-CICD.git
      targetRevision: HEAD
      ref: values #this value.yaml file will be provided to HELM valueFiles as an input

  destination:
    server: https://kubernetes.default.svc
    namespace: prometheus

  syncPolicy:
    automated:
      prune: true # means, if changes available in git, not matched to the cluster changes, but still argocd will not delete that particular changes from the cluster. Ideally it should delete because GIT and cluster state is not matching.
      selfHeal: true