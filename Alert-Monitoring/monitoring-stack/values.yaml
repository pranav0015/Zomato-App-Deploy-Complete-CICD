alertmanager:
  alertmanagerSpec:
    secrets:
      - slack-webhook

  service:
    type: LoadBalancer

  config:
    global:
      resolve_timeout: 5m
      slack_api_url_file: /etc/alertmanager/secrets/slack-webhook/slack_api_url

    route:
      receiver: slack-notifications

      group_by:
        - namespace

      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h

      routes:
        - matchers:
            - alertname="Watchdog"
          receiver: "null"

    receivers:
      - name: slack-notifications
        slack_configs:
          - channel: "#all-zomato-monitoring"
            send_resolved: true
            title: "{{ .CommonLabels.alertname }}"
            text: |
              Alert: {{ .CommonLabels.alertname }}

              Severity: {{ .CommonLabels.severity }}

              Description:
              {{ .CommonAnnotations.description }}

              Instance:
              {{ .CommonLabels.instance }}

      - name: "null"

prometheus:
  service:
    type: LoadBalancer