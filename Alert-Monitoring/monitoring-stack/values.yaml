alertmanager:
  alertmanagerSpec:
    secrets:
      - slack-webhook

  service:
    type: LoadBalancer

  config:
    global:
      resolve_timeout: 5m
      slack_api_url_file: /etc/alertmanager/secrets/slack-webhook/slack_api_url

    route:
      receiver: slack-notifications

    receivers:
      - name: slack-notifications
        slack_configs:
          - channel: "#all-zomato-monitoring"
            send_resolved: true
            title: "{{ .CommonLabels.alertname }}"
            text: |
              Alert: {{ .CommonLabels.alertname }}

              Severity: {{ .CommonLabels.severity }}

              Description:
              {{ .CommonAnnotations.description }}

              Instance:
              {{ .CommonLabels.instance }}

prometheus:
  service:
    type: LoadBalancer