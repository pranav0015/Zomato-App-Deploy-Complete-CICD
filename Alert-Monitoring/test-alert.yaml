apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule

metadata:
  name: test-alert
  namespace: monitoring

  labels:
    release: stable

spec:
  groups:
  - name: test-alert-group

    rules:
    - alert: TestAlert

      expr: vector(1)

      for: 1m

      labels:
        severity: warning

      annotations:
        summary: Test Alert

        description: Testing Alertmanager Integration