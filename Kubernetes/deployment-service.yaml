apiVersion: apps/v1
kind: Deployment
metadata:
  name:  zomato-app-deploy
  namespace: default
  labels:
    app:  zomato-app
spec:
  selector:
    matchLabels:
      app: zomato-app
  replicas: 2
  template:
    metadata:
      labels:
        app:  zomato-app
    spec:
      containers:
      - name:  zomato-app-container
        image:  zomato-ecr-image:latest
        imagePullPolicy: Always
        ports:
        - containerPort:  80
      restartPolicy: Always

---

apiVersion: v1
kind: Service
metadata:
  name: zomato-app-svc
  namespace: default
spec:
  selector:
    app: zomato-app
  type: LoadBalancer
  ports:
  - name: zomato-app
    protocol: TCP
    port: 80
    targetPort: 80 
    